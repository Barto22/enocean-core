CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_CPP=y
CONFIG_STD_CPP23=y
CONFIG_CPP_RTTI=n
CONFIG_CPP_EXCEPTIONS=n
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_C17=y

CONFIG_GPIO=y
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_BOOT_BANNER=n

# MCUBOOT PARTITIONS
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y 

CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_WATCHDOG=y

CONFIG_REBOOT=y

CONFIG_MCUMGR=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP_LABELS=y

CONFIG_BASE64=y
CONFIG_CRC=y

CONFIG_UART_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y

CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

CONFIG_NET_BUF=y
CONFIG_ZCBOR=y

# ---------------------------------------------------------------------------
# Bluetooth — passive observer (BLE scanner)
# ---------------------------------------------------------------------------
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_HOST_CCM=y
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_BT_BUF_EVT_RX_COUNT=20
CONFIG_BT_CTLR_DUP_FILTER_LEN=0

CONFIG_POSIX_C_LANG_SUPPORT_R=y
CONFIG_POSIX_API=y
